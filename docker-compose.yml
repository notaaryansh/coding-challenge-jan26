services:
  surrealdb:
    image: surrealdb/surrealdb:v2.1.4
    container_name: clera-surrealdb
    restart: unless-stopped
    ports:
      - "8000:8000"
    command:
      - start
      - --user
      - root
      - --pass
      - root
      - --bind
      - 0.0.0.0:8000
      - memory
    healthcheck:
      test: ["CMD", "/surreal", "is-ready", "--endpoint", "http://localhost:8000"]
      interval: 5s
      timeout: 3s
      retries: 10
